x-backend: &backend
  build:
    context: .
    dockerfile: containers/backend/Dockerfile
  env_file: .env
  environment:
    DB_HOST_NAME: "backend-db"
    DB_DATABASE_NAME: "rails"
    DB_USER_NAME: "root"
    DB_PASSWORD: ""
    REDIS_URL: "redis://backend-redis:6379"
    PLAYWRIGHT_URL: "ws://backend-playwright:8888/ws"
    CAMOUFOX_URL: "ws://backend-camoufox:8890/ws"
    ALLOWED_ORIGINS: "nginx,dev.price-monitoring.com"
  stdin_open: true
  tty: true
  depends_on:
    backend-db:
      condition: service_healthy
    backend-redis:
      condition: service_healthy
  volumes:
    - ./volumes/backend:/app
    - backend-bundle:/usr/local/bundle
    # TODO: esbuildなどでnpmパッケージが必要になったタイミングで有効化
    # - backend-node-modules:/app/node_modules

x-mysql: &mysql
  image: mysql/mysql-server:8.0
  healthcheck:
    test: ["CMD", "mysqladmin", "ping"]
    interval: 5s
    timeout: 5s
    retries: 5
  environment:
    MYSQL_ROOT_HOST: "%"
    MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
  stdin_open: true
  tty: true

x-redis: &redis
  image: "redis:latest"
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 5s
    timeout: 5s
    retries: 5

services:
  frontend:
    build:
      context: .
      dockerfile: containers/frontend/Dockerfile
    ports:
      - 8080:3000
    environment:
      NEXT_PRIVATE_API_URL: "https://nginx"
      NEXT_PUBLIC_API_URL: "https://dev.price-monitoring.com"
    stdin_open: true
    tty: true
    volumes:
      - ./volumes/frontend:/app

  backend:
    <<: *backend
    ports:
      - 3000:3000
    networks:
      - default
      - shared

  backend-batch-1:
    <<: *backend
    command: bundle exec sidekiq -C config/sidekiq/crawl_process.yml

  backend-batch-2:
    <<: *backend
    command: bundle exec sidekiq -C config/sidekiq/general_process.yml

  backend-batch-3:
    <<: *backend
    command: bundle exec sidekiq -C config/sidekiq/crawl_process_2.yml

  spring:
    <<: *backend
    command: bundle exec spring server && tail -f /dev/null

  backend-db:
    <<: *mysql
    volumes:
      - backend-db:/var/lib/mysql

  backend-redis:
    <<: *redis
    ports:
      - "6379:6379"
    volumes:
      - "backend-redis:/data"
    command: --appendonly yes

  backend-playwright:
    build:
      context: .
      dockerfile: containers/backend_playwright/Dockerfile
    ports:
      - 8888:8888

  backend-camoufox:
    build:
      context: .
      dockerfile: containers/backend_camoufox/Dockerfile
    ports:
      - 8890:8890

  nginx:
    image: nginx:latest
    ports:
      - "127.0.0.1:443:443"
    volumes:
      - ./volumes/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./volumes/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  backend-bundle:
  backend-db:
  backend-redis:

networks:
  shared:
    name: shared-network
